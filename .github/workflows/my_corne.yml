name: 'Build Example corne nice_nano zmk nice_view'
on: [push, workflow_dispatch]
jobs:
  build-left:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["nice_nano//zmk"]'
      shield: '["corne_left nice_view_adapter nice_view"]'
      alphas: '["QWERTY"]'
      nav: '["invertedT"]'
      custom_config: '["#define MIRYOKU_ZMK_STUDIO"]'
      snippet: '["studio-rpc-usb-uart"]'
      kconfig: '["CONFIG_BT_MAX_CONN=6\nCONFIG_BT_MAX_PAIRED=6\nCONFIG_ZMK_STUDIO=y\nCONFIG_BT_CTLR_TX_PWR_PLUS_8=y\nCONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y"]'
      branches: '["zmkfirmware/zmk/main"]'
  build-right:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["nice_nano//zmk"]'
      shield: '["corne_right nice_view_adapter nice_view"]'
      alphas: '["QWERTY"]'
      nav: '["invertedT"]'
      kconfig: '["CONFIG_BT_MAX_CONN=6\nCONFIG_BT_MAX_PAIRED=6\nCONFIG_BT_CTLR_TX_PWR_PLUS_8=y\nCONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y"]'
      branches: '["zmkfirmware/zmk/main"]'
